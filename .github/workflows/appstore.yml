name: App Store Release

on:
  workflow_dispatch:
    inputs:
      testflight_group:
        description: TestFlight 外部测试组名称
        required: false
        default: test
        type: string
      distribute_external:
        description: 上传后分发到外部测试组
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
    paths-ignore:
      - ci/build-number.txt
    tags:
      - "v*"

concurrency:
  group: appstore-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 90
    env:
      TESTFLIGHT_GROUP: ${{ github.event.inputs.testflight_group || 'test' }}
      TOOLCHAINS: com.apple.dt.toolchain.XcodeDefault

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26
        run: bash ci/scripts/select-xcode-26.sh

      - name: Show commit
        run: git rev-parse --short HEAD

      - name: Install fastlane
        run: brew install fastlane

      - name: Load config from repository
        run: bash ci/scripts/load-repo-config.sh

      - name: Prepare App Store Connect API key JSON
        run: bash ci/scripts/write-api-key-json.sh

      - name: Ensure App Store provisioning profile
        run: bash ci/scripts/ensure-provisioning-profile.sh

      - name: Import distribution certificate
        run: bash ci/scripts/import-signing.sh

      - name: Configure manual signing
        run: bash ci/scripts/configure-manual-signing.sh

      - name: Build and export IPA
        run: bash ci/scripts/build-archive-cloud.sh

      - name: Upload and distribute to TestFlight
        run: bash ci/scripts/distribute-testflight.sh

      - name: Save next build number
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/build-number.txt
          git diff --staged --quiet && exit 0
          git commit -m "chore: bump build counter to $(cat ci/build-number.txt)"
          git push
